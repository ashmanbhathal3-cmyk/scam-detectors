<!DOCTYPE html>
<html>
<head>
    <title>Scam Shield</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            padding-top: 100px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            width: 400px;
            margin: auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            width: 90%;
            padding: 10px;
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #667eea;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛡 Scam Shield</h1>
        <form method="POST">
            <input type="text" name="message" placeholder="Enter message here" required>
            <br>
            <button type="submit">Check Message</button>
        </form>

        {% if result %}
            <div class="result">{{ result }}</div>
        {% endif %}
    </div>

</body>
</html>
